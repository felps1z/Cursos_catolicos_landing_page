<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            font-family: 'Lato', sans-serif;
        }

        /* flex-start empurra tudo para a esquerda */
        .cards-container {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            overflow-x: auto;
        }

        .cards-container::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 260px;
            /* Largura cravada do card */
            height: 350px;
            position: relative;
            text-decoration: none;
            border-radius: 4px;
            overflow: hidden;
            display: block;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(40%);
        }

        .card span {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FFF;
            /* Texto padrão BRANCO */
            font-weight: 900;
            z-index: 2;
            text-transform: uppercase;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="cards-container">
        <a href="apologia_cards/artigo_pintura.html" target="_parent" class="card">
            <img src="img/pintura.jpeg"> <span class="destaque">PINTURA</span>
        </a>
        <a href="apologia_cards/artigo_crucifixo.html" target="_parent" class="card">
            <img src="img/crucifixo.jpg"> <span>CRUCIFIXO</span>
        </a>
        <a href="apologia_cards/artigo_estatua.html" target="_parent" class="card">
            <img src="img/estatua.jpg"> <span>ESTÁTUA</span>
        </a>
        <a href="apologia_cards/artigo_idolatria.html" target="_parent" class="card">
            <img src="img/idolatria.jpeg"> <span>IDOLATRIA</span>
        </a>
        <a href="apologia_cards/artigo_serpente.html" target="_parent" class="card">
            <img src="img/serpente.jpg"> <span>SERPENTE DE BRONZE</span>
        </a>
    </div>

</body>

</html>
