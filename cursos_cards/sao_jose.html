<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100vh; /* Ocupa a altura total do iframe */
            background-color: #fff;
            box-sizing: border-box;
            padding: 20px;
        }
        .imagem-curso {
            width: 45%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .info-curso {
            width: 50%;
            padding: 20px;
        }
        h3 {
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            margin-top: 0;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .cta-button {
            background-color: #E6A23C;
            color: #fff;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <img src="img/sao_jose.jpg" title="Imagem de São José" alt="Imagem de São José" class="imagem-curso">

    <div class="info-curso">
        <h3>São José: O Pai Adotivo</h3>
        <p>Um simples carpinteiro ou o guardião da Sagrada Família? O homem justo que, no silêncio, aceitou a vontade de Deus. Mergulhe na vida e nas virtudes do glorioso Patrono da Igreja Universal.</p>
        <a href="curso_jose.html" target="_top" class="cta-button">Saiba mais</a>
    </div>

</body>
</html>
